<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B: Neon Cyber</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
.slide {
  width: 100vw; height: 100vh; height: 100dvh;
  overflow: hidden; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  position: relative;
  background: #0a0f1c;
}
:root {
  --cyan: #00ffcc;
  --magenta: #ff00aa;
  --navy: #0a0f1c;
  --text-light: #e0f0ff;
  --slide-padding: clamp(1rem, 4vw, 4rem);
}

/* Grid background */
.slide::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridPulse 4s ease-in-out infinite;
}

/* Particle dots */
.particles {
  position: absolute; inset: 0; overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--cyan);
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat 3s ease-in-out infinite;
}
.particle:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; }
.particle:nth-child(2) { left: 75%; top: 30%; animation-delay: 0.5s; background: var(--magenta); }
.particle:nth-child(3) { left: 40%; top: 70%; animation-delay: 1s; }
.particle:nth-child(4) { left: 85%; top: 60%; animation-delay: 1.5s; background: var(--magenta); }
.particle:nth-child(5) { left: 25%; top: 85%; animation-delay: 2s; }
.particle:nth-child(6) { left: 60%; top: 15%; animation-delay: 2.5s; background: var(--magenta); }

.content {
  text-align: center;
  position: relative; z-index: 1;
  padding: var(--slide-padding);
}

.tag {
  font-family: 'Satoshi', sans-serif;
  font-size: clamp(0.6rem, 1vw, 0.85rem);
  font-weight: 700;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 0.3em;
  margin-bottom: clamp(1rem, 3vh, 2rem);
  animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
}

h1 {
  font-family: 'Clash Display', sans-serif;
  font-size: clamp(3.5rem, 10vw, 8rem);
  font-weight: 700;
  color: var(--text-light);
  line-height: 1;
  margin-bottom: clamp(0.5rem, 2vh, 1.5rem);
  animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
  text-shadow: 0 0 60px rgba(0,255,204,0.15);
}

h1 .accent-cyan {
  color: var(--cyan);
  text-shadow: 0 0 30px rgba(0,255,204,0.4), 0 0 60px rgba(0,255,204,0.2);
}

h1 .accent-magenta {
  color: var(--magenta);
  text-shadow: 0 0 30px rgba(255,0,170,0.4), 0 0 60px rgba(255,0,170,0.2);
}

.subtitle {
  font-family: 'Satoshi', sans-serif;
  font-size: clamp(0.85rem, 1.8vw, 1.3rem);
  font-weight: 400;
  color: rgba(224,240,255,0.45);
  margin-bottom: clamp(1.5rem, 4vh, 3rem);
  animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
}

.glow-line {
  width: clamp(60px, 10vw, 120px);
  height: 2px;
  margin: 0 auto;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  box-shadow: 0 0 10px var(--cyan);
  animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
}

/* Corner accents */
.corner {
  position: absolute; width: 40px; height: 40px;
  border-color: rgba(0,255,204,0.2);
  border-style: solid; border-width: 0;
}
.corner-tl { top: 5%; left: 5%; border-top-width: 1px; border-left-width: 1px; }
.corner-br { bottom: 5%; right: 5%; border-bottom-width: 1px; border-right-width: 1px; border-color: rgba(255,0,170,0.2); }

@keyframes revealUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes gridPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes particleFloat {
  0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
  50% { opacity: 0.7; transform: translateY(-20px) scale(1.5); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="slide">
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <div class="tag">// Tech Center · 2026 Season 1</div>
    <h1><span class="accent-cyan">皇冠</span>竞赛</h1>
    <p class="subtitle">会员数字化 · 绩效竞赛平台 v1.0</p>
    <div class="glow-line"></div>
  </div>
</div>
</body>
</html>
